<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#163A7A"/>
  <!-- radio waves -->
  <g stroke="#FFD86B" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M71,28 q7,-3 11,3"/>
    <path d="M68,32 q11,-5 17,4"/>
  </g>
  <!-- antenna -->
  <line x1="63" y1="41" x2="77" y2="23" stroke="#FFD86B" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="77" cy="23" r="3.5" fill="#FFA62B"/>
  <!-- radio body -->
  <rect x="19" y="41" width="58" height="38" rx="7" fill="#F0A030"/>
  <rect x="19" y="41" width="58" height="38" rx="7" fill="none" stroke="#B5650D" stroke-width="2"/>
  <!-- speaker grille -->
  <circle cx="37" cy="60" r="11" fill="#7A3F08"/>
  <circle cx="37" cy="60" r="11" fill="none" stroke="#FFD86B" stroke-width="1.5"/>
  <circle cx="37" cy="60" r="3" fill="#FFD86B"/>
  <!-- tuning dial -->
  <rect x="52" y="49" width="18" height="9" rx="2" fill="#7A3F08"/>
  <line x1="56" y1="51" x2="56" y2="56" stroke="#FFD86B" stroke-width="1.2"/>
  <line x1="61" y1="51" x2="61" y2="56" stroke="#FFD86B" stroke-width="1.2"/>
  <line x1="66" y1="51" x2="66" y2="56" stroke="#FF6B35" stroke-width="1.8"/>
  <!-- knobs -->
  <circle cx="57" cy="69" r="3.5" fill="#7A3F08"/>
  <circle cx="67" cy="69" r="3.5" fill="#7A3F08"/>
</svg>